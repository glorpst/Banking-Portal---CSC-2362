{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #461d7c;">Admin Transfer</h2>
    <p style="text-align: center; margin-bottom: 1.5rem; color: #666;">As administrator, you can transfer money between any accounts</p>
    
    <form method="POST">
        <div class="form-group">
            <label>From Account:</label>
            <select name="from_account" required>
                <option value="">Select source account</option>
                {% for account in accounts %}
                <option value="{{ account.account_number }}">
                    {{ account.account_number }} ({{ account.owner }}) - ${{ "%.2f"|format(account.balance) }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>To Account Number:</label>
            <select name="to_account" required>
                <option value="">Select destination account</option>
                {% for account in accounts %}
                <option value="{{ account.account_number }}">
                    {{ account.account_number }} ({{ account.owner }}) - ${{ "%.2f"|format(account.balance) }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Amount ($):</label>
            <input type="number" name="amount" step="0.01" min="0.01" required>
        </div>
        
        <div class="form-group">
            <label>Description:</label>
            <input type="text" name="description" placeholder="Admin transfer reason">
        </div>
        
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary btn-large">Execute Transfer</button>
            <a href="/admin" class="btn btn-secondary">Back to Admin Panel</a>
        </div>
    </form>
</div>
{% endblock %}
