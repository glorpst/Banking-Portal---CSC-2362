{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #461d7c;">Open New Account</h2>
    <form method="POST">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="full_name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" required placeholder="johndoe">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" required placeholder="Choose a password">
        </div>
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary btn-large">Create Account</button>
        </div>
    </form>
    <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="/login">Login here</a></p>
</div>
{% endblock %}
